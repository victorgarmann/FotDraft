<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FotDraft — FIFA World Cup 2026 Fantasy Draft</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0a0a0a;
      color: #f0f0f0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      text-align: center;
    }
    .logo {
      font-size: 3rem;
      font-weight: 800;
      letter-spacing: -1px;
      margin-bottom: 0.5rem;
    }
    .logo span { color: #e63946; }
    .tagline {
      font-size: 1.1rem;
      color: #888;
      margin-bottom: 3rem;
    }
    .description {
      max-width: 480px;
      line-height: 1.7;
      color: #ccc;
      margin-bottom: 3rem;
    }
    .badge {
      display: inline-block;
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 12px;
      padding: 0.75rem 1.5rem;
      font-size: 0.95rem;
      color: #888;
      margin-bottom: 3rem;
    }
    .support {
      font-size: 0.9rem;
      color: #555;
    }
    .support a {
      color: #e63946;
      text-decoration: none;
    }
    .support a:hover { text-decoration: underline; }
    footer {
      margin-top: 4rem;
      font-size: 0.8rem;
      color: #444;
    }
    footer a { color: #555; text-decoration: none; }
    footer a:hover { color: #888; }
  </style>
</head>
<body>
  <div class="logo">Fot<span>Draft</span></div>
  <p class="tagline">FIFA World Cup 2026 Fantasy Draft</p>

  <p class="description">
    Create a group with friends, snake-draft national team players into your squad,
    and earn points based on real match ratings. 48 nations. 8 matchdays. One champion.
  </p>

  <div class="badge">Coming soon to the App Store</div>

  <div class="support">
    Need help? Contact us at <a href="mailto:snarum@gmail.com">snarum@gmail.com</a>
  </div>

  <footer>
    <a href="privacy.html">Privacy Policy</a>
  </footer>
</body>
</html>
